[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions", "**/migrations/**"]

[tool.ruff.lint]
select = [
  "E", "F", "W",     # pycodestyle / pyflakes
  "I",               # isort
  "B",               # bugbear
  "UP",              # pyupgrade
  "ASYNC",           # async-correctness
  "RUF",             # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["B011", "E731"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["alembic/versions/", "apps/ml/training/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps/api/tests", "apps/worker/tests", "apps/ml/tests"]
