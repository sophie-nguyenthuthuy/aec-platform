[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions", "**/migrations/**"]

[tool.ruff.lint]
select = [
  "E", "F", "W",     # pycodestyle / pyflakes
  "I",               # isort
  "B",               # bugbear
  "UP",              # pyupgrade
  "ASYNC",           # async-correctness
  "RUF",             # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter
# RUF002 / RUF003 flag "ambiguous unicode" — chars that LOOK like ASCII
# but aren't. The ones that hit us are intentional typography in
# performance/math docstrings, not typos:
#   ×  U+00D7  MULTIPLICATION SIGN  (e.g. "3 phases × 50ms")
#   →  U+2192  RIGHTWARDS ARROW     (e.g. "todo → in_progress")
#   ≥  U+2265  GREATER-THAN-OR-EQUAL (math)
#   ≤  U+2264  LESS-THAN-OR-EQUAL    (math)
# Whitelist the codepoints so they don't fire — the lint is meant to
# catch lookalikes (e.g. Cyrillic 'е' in identifiers), not legitimate
# unicode operators.
allowed-confusables = ["×", "→", "≥", "≤"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's whole point is parameter-default DI: `arg = Depends(...)` /
# `arg = Query(...)` is the idiom, not an antipattern. Whitelist the
# framework helpers so B008 stops flagging legitimate route signatures.
extend-immutable-calls = [
  "Depends", "fastapi.Depends",
  "Query",   "fastapi.Query",
  "Path",    "fastapi.Path",
  "Body",    "fastapi.Body",
  "Header",  "fastapi.Header",
  "Cookie",  "fastapi.Cookie",
  "File",    "fastapi.File",
  "Form",    "fastapi.Form",
  "Security","fastapi.Security",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["B011", "E731"]
# `models/pulse.py` defines the timezone-aware DateTime alias *between*
# imports so each Mapped[datetime] column reads naturally. Linear
# top-of-file ordering would force every column to write
# `DateTime(timezone=True)` inline.
"apps/api/models/pulse.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["alembic/versions/", "apps/ml/training/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps/api/tests", "apps/worker/tests", "apps/ml/tests"]
markers = [
    # Opt-in lane (apps/api/tests/conftest.py wires `--integration`). Tests
    # tagged with this marker hit a live Postgres + apply the full alembic
    # schema. Default `pytest` deselects them; `pytest --integration` runs them.
    "integration: requires a live Postgres (COSTPULSE_RLS_DB_URL)",
]
filterwarnings = [
    # langsmith (transitive langchain dep) calls `pydantic.v1` ForwardRef
    # machinery at class-definition time; emits a Python 3.13
    # DeprecationWarning we can't fix at the source. Mirror the same
    # filter from `apps/api/pyproject.toml` so this is silenced regardless
    # of which pyproject pytest happens to read.
    "ignore::DeprecationWarning:pydantic.v1.typing",
]
