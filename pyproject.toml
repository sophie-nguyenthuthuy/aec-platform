[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions", "**/migrations/**"]

[tool.ruff.lint]
select = [
  "E", "F", "W",     # pycodestyle / pyflakes
  "I",               # isort
  "B",               # bugbear
  "UP",              # pyupgrade
  "ASYNC",           # async-correctness
  "RUF",             # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.lint.flake8-bugbear]
# FastAPI's whole point is parameter-default DI: `arg = Depends(...)` /
# `arg = Query(...)` is the idiom, not an antipattern. Whitelist the
# framework helpers so B008 stops flagging legitimate route signatures.
extend-immutable-calls = [
  "Depends", "fastapi.Depends",
  "Query",   "fastapi.Query",
  "Path",    "fastapi.Path",
  "Body",    "fastapi.Body",
  "Header",  "fastapi.Header",
  "Cookie",  "fastapi.Cookie",
  "File",    "fastapi.File",
  "Form",    "fastapi.Form",
  "Security","fastapi.Security",
]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["B011", "E731"]
# `models/pulse.py` defines the timezone-aware DateTime alias *between*
# imports so each Mapped[datetime] column reads naturally. Linear
# top-of-file ordering would force every column to write
# `DateTime(timezone=True)` inline.
"apps/api/models/pulse.py" = ["E402"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["alembic/versions/", "apps/ml/training/"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["apps/api/tests", "apps/worker/tests", "apps/ml/tests"]
markers = [
    # Opt-in lane (apps/api/tests/conftest.py wires `--integration`). Tests
    # tagged with this marker hit a live Postgres + apply the full alembic
    # schema. Default `pytest` deselects them; `pytest --integration` runs them.
    "integration: requires a live Postgres (COSTPULSE_RLS_DB_URL)",
]
