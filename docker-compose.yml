services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: aec
      POSTGRES_PASSWORD: aec
      POSTGRES_DB: aec
    ports: ["5438:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aec"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  # MinIO — S3-compatible object storage. Drawings, photos, generated
  # PDFs all land here. We pick MinIO over a Cloud-S3 dependency
  # because Vietnamese SOE customers typically require data sovereignty
  # (no PII / drawings leaving their server room). Same code path works
  # against AWS S3 in dev cloud — just set S3_ENDPOINT_URL=None.
  #
  # First-boot bucket creation via the bootstrapping container below
  # (`minio-init`). The default bucket name matches the `s3_bucket`
  # setting (`aec-platform-files`). Default credentials are admin/admin
  # — override in production via environment.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aec-platform
      MINIO_ROOT_PASSWORD: aec-platform-dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  # One-shot init: create the default bucket on first startup.
  # Idempotent — re-running does nothing if the bucket exists.
  minio-init:
    image: minio/mc:RELEASE.2025-04-08T15-39-49Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
      mc alias set local http://minio:9000 aec-platform aec-platform-dev &&
      mc mb --ignore-existing local/aec-platform-files &&
      mc anonymous set download local/aec-platform-files &&
      echo '✓ MinIO bucket aec-platform-files ready'
      "

  # Runtime DB role split:
  #   aec      — superuser. Used by (a) alembic migrations (DDL needs OWN)
  #              and (b) a small set of cross-tenant batch jobs via the
  #              `AdminSessionFactory` (DATABASE_URL_ADMIN below).
  #   aec_app  — NOBYPASSRLS, LOGIN only. Used by every request-scoped
  #              runtime connection (API handlers + per-org worker jobs).
  # Superusers implicitly bypass RLS, so connecting request traffic as `aec`
  # would render every `tenant_isolation_*` policy a no-op. Migration
  # 0010_app_role provisions aec_app with CRUD grants + ALTER DEFAULT PRIVILEGES.
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      # Runtime = non-superuser; policies are enforced.
      DATABASE_URL: postgresql+asyncpg://aec_app:aec_app@postgres:5432/aec
      # Admin = superuser; used only by background jobs that legitimately
      # read/write across tenants (price-alert evaluator, bidradar scrape
      # fanout, weekly-report discovery). Request handlers must NOT use it.
      DATABASE_URL_ADMIN: postgresql+asyncpg://aec:aec@postgres:5432/aec
      # Migrations = superuser; alembic reads this via env.py.
      DATABASE_URL_SYNC: postgresql://aec:aec@postgres:5432/aec
      REDIS_URL: redis://redis:6379/0
      SUPABASE_JWT_SECRET: dev-secret-change-me
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-qwen2.5:7b-instruct}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-qwen2.5vl:7b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      CORS_ORIGINS: '["http://localhost:3000"]'
      # MinIO object storage — see services.minio below. The endpoint
      # uses the docker-network DNS name so the api container can reach
      # it; on bare-metal / non-compose deploys, override to whatever
      # MinIO host the customer runs.
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: aec-platform
      S3_SECRET_ACCESS_KEY: aec-platform-dev
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET: aec-platform-files
    ports: ["8000:8000"]
    depends_on:
      postgres:   { condition: service_healthy }
      redis:      { condition: service_healthy }
      minio:      { condition: service_healthy }
      ollama:     { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/ml:/app/apps/ml

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://aec_app:aec_app@postgres:5432/aec
      DATABASE_URL_ADMIN: postgresql+asyncpg://aec:aec@postgres:5432/aec
      DATABASE_URL_SYNC: postgresql://aec:aec@postgres:5432/aec
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-qwen2.5:7b-instruct}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-qwen2.5vl:7b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      # Worker also needs MinIO — drawbridge ingest writes chunked
      # PDFs back, pulse writes weekly-report PDFs.
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: aec-platform
      S3_SECRET_ACCESS_KEY: aec-platform-dev
      S3_FORCE_PATH_STYLE: "true"
      S3_BUCKET: aec-platform-files
    # depends_on: api ensures migrations (which create aec_app) complete before
    # any worker tries to auth as aec_app. Without this, a fresh volume can
    # race the worker startup against alembic and fail with
    # "password authentication failed for user aec_app".
    depends_on:
      postgres: { condition: service_healthy }
      minio:    { condition: service_healthy }
      redis:    { condition: service_healthy }
      ollama:   { condition: service_healthy }
      api:      { condition: service_started }
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./apps/api:/app/apps/api
      - ./apps/ml:/app/apps/ml

  # Arq worker — handles SiteEye photo analysis, weekly reports (with embedded
  # cron), RFQ dispatch, and price-alert evaluation. Reuses the api image since
  # the queue module lives under apps/api/workers/queue.py.
  arq-worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://aec_app:aec_app@postgres:5432/aec
      # weekly_report_cron + price_alerts_evaluate_job + bidradar fanout need
      # cross-tenant visibility; AdminSessionFactory reads this.
      DATABASE_URL_ADMIN: postgresql+asyncpg://aec:aec@postgres:5432/aec
      DATABASE_URL_SYNC: postgresql://aec:aec@postgres:5432/aec
      REDIS_URL: redis://redis:6379/0
      SUPABASE_JWT_SECRET: dev-secret-change-me
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-qwen2.5:7b-instruct}
      LLM_VISION_MODEL: ${LLM_VISION_MODEL:-qwen2.5vl:7b}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-nomic-embed-text}
      SITEEYE_RAY_SERVE_URL: http://siteeye-safety:8000
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      ollama:   { condition: service_healthy }
      api:      { condition: service_started }  # wait for migrations (see worker above)
    # `arq` auto-discovers cron_jobs from WorkerSettings, so weekly_report_cron
    # runs inside this process on Mon 06:00 UTC.
    command: ["arq", "workers.queue.WorkerSettings"]
    volumes:
      - ./apps/api:/app/apps/api
      - ./apps/ml:/app/apps/ml

  # OSS LLM gateway. Dev/CPU default = Ollama. For GPU production replace
  # this service with vLLM or SGLang serving the same /v1/chat/completions
  # and /v1/embeddings — clients only need LLM_BASE_URL.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama: { condition: service_healthy }
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    # Embedding model is mandatory; chat + vision pre-pulled so first request
    # doesn't time out. Drop the 32b pull on CPU-only laptops by overriding
    # this command in a docker-compose.override.yml.
    command:
      # Tiny tier: only what's needed for CPU dev. Production should also
      # pull qwen2.5vl:7b (vision) and qwen2.5:32b-instruct (full reasoning).
      - "ollama pull nomic-embed-text && ollama pull qwen2.5:7b-instruct || true"
    restart: "no"

  # Ray Serve YOLOv8m safety model. The api + arq worker call this at
  # ${SITEEYE_RAY_SERVE_URL}/siteeye-safety/infer. GPU is optional locally —
  # ultralytics falls back to CPU.
  siteeye-safety:
    build:
      context: .
      dockerfile: infra/docker/siteeye-safety.Dockerfile
    environment:
      # Local smoke testing can point at a bundled weights path; prod uses S3.
      SITEEYE_YOLO_WEIGHTS: ${SITEEYE_YOLO_WEIGHTS:-s3://aec-platform-models/siteeye/yolov8m-safety-vi.pt}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
    ports: ["8001:8000"]
    # No depends_on — the api/arq-worker retry on failure.
    profiles: ["ml"]  # opt-in: `docker compose --profile ml up` to start.

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
  miniodata:
  ollama_data:
