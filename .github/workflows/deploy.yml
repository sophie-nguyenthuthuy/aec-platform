name: Deploy

# Hosted-environment deploy via GitHub OIDC → AWS IAM. Gated on secrets:
#   - AWS_ACCOUNT_ID
#   - AWS_DEPLOY_ROLE_ARN
# Provisioned via `infra/terraform/github_oidc.tf`. Until both secrets
# are set, every job in this file is skipped (the `precheck` job's
# output is the gate). That means dropping this file into the repo before
# AWS is wired up doesn't break CI — the workflow runs, sees the missing
# secret, and exits cleanly. Once `terraform apply` lands and the secrets
# are populated (`gh secret set ...`), deploys begin happening on every
# push to main with no further config changes.
#
# ## Secrets
#
# AWS credentials (required — no deploy without these):
#   - AWS_ACCOUNT_ID                       — e.g. "123456789012"
#   - AWS_DEPLOY_ROLE_ARN                  — IAM role assumed via OIDC
#   - ECS_NETWORK_CONFIG                   — JSON for `aws ecs run-task` migrate step
#
# Web build-time secrets (required for the web build to produce a
# functional client bundle — see infra/docker/web.Dockerfile for why
# these are build-args, not runtime env):
#   - NEXT_PUBLIC_API_BASE                 — public origin of the API, e.g.
#                                            "https://api.aec.example.com"
#   - NEXT_PUBLIC_SUPABASE_URL             — Supabase project URL
#   - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY — Supabase publishable (anon) key.
#                                            New name as of @supabase/supabase-js 2.45+;
#                                            safe to ship publicly.
#
# Set with: `gh secret set NEXT_PUBLIC_SUPABASE_URL --body "https://..."`
# Setting these in the workflow `env:` block (rather than the build-args
# below) would be wrong — `next build` reads them at build time, and
# without them the client bundle inlines `undefined` and crashes on
# first interaction.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Which service to deploy (api | web | worker | all)"
        required: false
        default: "all"

permissions:
  id-token: write   # OIDC to AWS
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-southeast-1.amazonaws.com
  ECS_CLUSTER: aec-platform
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Gate: skip the whole pipeline cleanly when AWS secrets aren't set.
  # Without this, the configure-aws-credentials step would fail with
  # 'Could not load credentials' and red-flag the run.
  precheck:
    name: Check AWS secrets are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.AWS_DEPLOY_ROLE_ARN }}" ] && [ -n "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ AWS OIDC secrets present — deploy will proceed."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS_DEPLOY_ROLE_ARN / AWS_ACCOUNT_ID not set — deploy skipped. Run terraform in infra/terraform/ then 'gh secret set' the outputs."
          fi

  build-push:
    name: Build & push images
    needs: precheck
    if: needs.precheck.outputs.configured == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, web, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      # Hard-fail the web build if any of the three NEXT_PUBLIC_* secrets
      # is missing. Without this guard, `docker build-push-action` happily
      # passes empty strings as build-args, the Dockerfile defaults the
      # ARG to `""`, `next build` succeeds, and the client bundle ships
      # with `undefined` Supabase-URL literals — the first user click in
      # production crashes with "Missing Supabase env" inside Sentry.
      # Better to red-gate the deploy here than discover at 2am. Re-add
      # if a formatter strips it.
      #
      # Skip for the api/worker images — their Dockerfiles don't declare
      # these ARGs, so missing secrets there are a no-op.
      - name: Verify NEXT_PUBLIC_* secrets are populated (web only)
        if: matrix.service == 'web'
        env:
          NEXT_PUBLIC_API_BASE: ${{ secrets.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
        run: |
          missing=""
          for var in NEXT_PUBLIC_API_BASE NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!var}" ]; then
              missing="$missing $var"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required deploy secrets:$missing"
            echo "::error::Set with: gh secret set <NAME> --body '<value>'"
            echo "::error::See deploy.yml '## Secrets' header for the full list."
            exit 1
          fi
          echo "✓ All NEXT_PUBLIC_* secrets present."

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/aec-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/aec-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          # `NEXT_PUBLIC_*` are baked into the client JS bundle by
          # `next build` (see infra/docker/web.Dockerfile). They're harmless
          # build args for the api/worker images — Docker silently ignores
          # ARGs that aren't declared in the Dockerfile, so passing them
          # uniformly across the matrix is fine.
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  deploy:
    name: Roll ECS services
    runs-on: ubuntu-latest
    needs: build-push
    strategy:
      max-parallel: 1
      matrix:
        service: [api, web, worker]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current task definition
        id: taskdef
        run: |
          aws ecs describe-task-definition \
            --task-definition aec-${{ matrix.service }} \
            --query taskDefinition > taskdef.json

      - name: Render new task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: taskdef.json
          container-name: aec-${{ matrix.service }}
          image: ${{ env.ECR_REGISTRY }}/aec-${{ matrix.service }}:${{ env.IMAGE_TAG }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: aec-${{ matrix.service }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  migrate:
    name: Alembic migrate (prod)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run one-off migration task
        run: |
          aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition aec-api-migrate \
            --launch-type FARGATE \
            --network-configuration "${{ secrets.ECS_NETWORK_CONFIG }}" \
            --overrides '{"containerOverrides":[{"name":"aec-api","command":["alembic","upgrade","head"]}]}'
