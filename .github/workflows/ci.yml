name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gate — runs ruff, ruff-format, and basic file-hygiene hooks
  # against every file in the repo. Catches the kind of drift that
  # used to slip past local commits (forgotten `ruff format`, trailing
  # whitespace, etc.) without paying for the full Postgres + Playwright
  # job-graph below. Mirrors what `make hooks` enforces locally.
  #
  # Independent job (not a step) so it runs in parallel with the other
  # gates and surfaces its own failure rather than blocking them — a
  # broken hygiene check shouldn't hide an unrelated typecheck regression.
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: pre-commit/action@v3.0.1

  node:
    name: Node — typecheck + lint + web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # No `version:` here — the action reads `packageManager` from
      # package.json (currently "pnpm@9.0.0"). Specifying both errors out
      # with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Build web
        run: pnpm --filter @aec/web build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
          # The Supabase JS client v2.45+ reads PUBLISHABLE_KEY rather than
          # ANON_KEY (anon was renamed). Setting both keeps both code paths
          # happy if the dep gets bumped or rolled back.
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder

      # ---- Playwright E2E ----
      # Tests live in apps/web/tests/e2e/*.spec.ts. The Playwright config
      # boots `next dev --port 3101` itself (webServer block) and intercepts
      # API calls via `page.route()` — no real backend or DB required.
      #
      # `--with-deps` installs the OS-level libs Chromium needs on Ubuntu
      # runners (libgbm, libnss3, etc.). Install only chromium because the
      # config pins `channel: "chromium"`, no other browsers needed.
      - name: Install Playwright browsers
        run: pnpm --filter @aec/web exec playwright install --with-deps chromium

      - name: Playwright (web E2E)
        run: pnpm --filter @aec/web test:e2e
        env:
          # `process.env.CI` flips Playwright into CI mode (forbid `.only`,
          # 2 retries, single worker, github reporter). pnpm normally
          # forwards CI=true automatically, but be explicit.
          CI: "true"

      # Upload `test-results/` (traces + screenshots from retries, only
      # populated when something failed) so debugging a CI-only flake
      # doesn't require a re-run with extra logging.
      - name: Upload Playwright trace artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: apps/web/test-results/
          retention-days: 7

  python-api:
    name: Python — API lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: aec
          POSTGRES_PASSWORD: aec
          POSTGRES_DB: aec_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aec"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    env:
      # Default app DB URL — this matches what apps/api/db/session.py reads
      # for `SessionFactory`. Using `aec` (superuser) here keeps the
      # router-level unit tests behaving identically to local dev; the
      # integration suite below explicitly tests the aec_app NOBYPASSRLS
      # path via COSTPULSE_RLS_APP_URL.
      DATABASE_URL: postgresql+asyncpg://aec:aec@localhost:5432/aec_test
      DATABASE_URL_SYNC: postgresql://aec:aec@localhost:5432/aec_test
      # AdminSessionFactory destination; identical to DATABASE_URL since
      # `aec` is already the superuser. test_admin_session_factory.py
      # asserts the two factories return *different* visibility, so the
      # integration suite swaps to aec_app for the request-scoped factory
      # via COSTPULSE_RLS_APP_URL below.
      DATABASE_URL_ADMIN: postgresql+asyncpg://aec:aec@localhost:5432/aec_test
      REDIS_URL: redis://localhost:6379/0
      SUPABASE_JWT_SECRET: ci-test-secret
      ANTHROPIC_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      # ---- Integration lane ----
      # Provisioned by migration 0010_app_role with the dev-default password
      # (the role name itself; see migration docstring). All five integration
      # test modules read these.
      COSTPULSE_RLS_DB_URL: postgresql+asyncpg://aec:aec@localhost:5432/aec_test
      COSTPULSE_RLS_APP_URL: postgresql+asyncpg://aec_app:aec_app@localhost:5432/aec_test
      COSTPULSE_RLS_ADMIN_URL: postgresql+asyncpg://aec:aec@localhost:5432/aec_test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          # requirements-dev.txt pulls in requirements.txt + pinned dev tools
          # (ruff, mypy, pytest). Pinning ruff here is critical — unpinned,
          # CI drifts to whatever ruff release ships next and silently
          # breaks the lint gate when new rules turn on by default.
          pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check apps/api apps/worker apps/ml

      - name: Ruff format check
        run: ruff format --check apps/api apps/worker apps/ml

      - name: Alembic upgrade
        working-directory: apps/api
        run: alembic upgrade head

      # Catches the kind of regression we hit when a parallel branch lands
      # a sibling migration: `alembic heads` should always return exactly
      # one head (any merge that spawns a branch must be merged downstream).
      # Without this gate, an unmerged branch would deploy fine on a fresh
      # DB but break any existing DB that hadn't traversed both sides of
      # the split.
      - name: Alembic — single head
        working-directory: apps/api
        run: |
          heads=$(alembic heads 2>/dev/null | grep -c '(head)' || true)
          if [ "$heads" != "1" ]; then
            echo "Expected exactly 1 alembic head, got $heads:"
            alembic heads
            exit 1
          fi

      # Round-trip: upgrade → downgrade → upgrade again. Catches:
      #   * a downgrade that references a table created in a sibling branch
      #     (the 0014/0013_dailylog scenario from this codebase's history)
      #   * a column type that the downgrade can't reverse (e.g. pgvector
      #     halfvec without ALTER COLUMN ... USING)
      #   * a migration whose upgrade only works against a clean DB
      - name: Alembic — downgrade + re-upgrade
        working-directory: apps/api
        run: |
          alembic downgrade base
          alembic upgrade head

      - name: Pytest (unit + integration)
        working-directory: apps/api
        # `--integration` opts the 12 lane-tagged tests into the run. The lane
        # is wired by apps/api/tests/conftest.py — without the flag those
        # tests are deselected (not skipped). The Postgres + Redis service
        # containers above plus the alembic step (which provisions aec_app)
        # satisfy every requirement.
        #
        # `--junitxml` writes a structured report into test-results/ so the
        # upload-artifact step below has something to publish on failure.
        # Mirrors the Playwright trace upload in the Node job.
        run: pytest --integration -q --junitxml=test-results/junit.xml

      # Upload pytest results when the job fails so a CI-only flake doesn't
      # require a re-run with extra logging. Default retention keeps disk
      # usage bounded; 7 days is enough to triage.
      - name: Upload pytest results (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: apps/api/test-results/
          retention-days: 7

  terraform:
    name: Terraform — fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform
      - run: terraform validate
        working-directory: infra/terraform

  # ----------------------------------------------------------------------
  # Security audits — pnpm + pip
  #
  # Runs on every PR and uploads a JSON report as a build artifact. The
  # job is intentionally **non-blocking** today: the repo carries existing
  # advisories (notably next 14.2.x with several HIGH and 1 CRITICAL —
  # GHSA-f82v-jwr5-mffw, the middleware-auth bypass — patched in 14.2.25)
  # that need their own dependency-bump PR. Gating on those today would
  # red every PR until the bump lands.
  #
  # To ratchet this to blocking later: drop the `|| true` from each audit
  # step and choose a threshold (`--audit-level high` for pnpm, `--strict`
  # for pip-audit). Recommend doing that AFTER the next bump.
  # ----------------------------------------------------------------------
  security:
    name: Security — dependency audit (non-blocking)
    runs-on: ubuntu-latest
    # Don't fail the workflow if this job fails internally — it's
    # informational. Required-status-checks rules should NOT include this
    # job until the gate is ratcheted up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit
        # `|| true` keeps the step green even when advisories are present;
        # remove once the existing pile is cleared. JSON output is what we
        # actually persist for review.
        run: |
          mkdir -p audit
          pnpm audit --prod --json > audit/pnpm.json || true
          # Plain-text view also goes to the log so reviewers don't have to
          # download the artifact for a quick triage.
          pnpm audit --prod || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: pip-audit
        # `--strict` flips pip-audit's exit code to nonzero on any vuln;
        # we deliberately omit it for the same ratchet-later reason.
        run: |
          pip install pip-audit
          mkdir -p audit
          pip-audit -r apps/api/requirements.txt --skip-editable -f json -o audit/pip.json || true
          pip-audit -r apps/api/requirements.txt --skip-editable || true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-audit
          path: audit/
          retention-days: 30
