name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node — typecheck + lint + web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — the action reads `packageManager` from
      # package.json (currently "pnpm@9.0.0"). Specifying both errors out
      # with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Build web
        run: pnpm --filter @aec/web build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: http://localhost
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder

  python-api:
    name: Python — API lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: aec
          POSTGRES_PASSWORD: aec
          POSTGRES_DB: aec_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aec"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://aec:aec@localhost:5432/aec_test
      DATABASE_URL_SYNC: postgresql://aec:aec@localhost:5432/aec_test
      REDIS_URL: redis://localhost:6379/0
      SUPABASE_JWT_SECRET: ci-test-secret
      ANTHROPIC_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio

      - name: Ruff
        run: ruff check apps/api apps/worker apps/ml

      - name: Ruff format check
        run: ruff format --check apps/api apps/worker apps/ml

      - name: Alembic upgrade
        working-directory: apps/api
        run: alembic upgrade head

      - name: Pytest
        working-directory: apps/api
        run: pytest -q

  terraform:
    name: Terraform — fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform
      - run: terraform validate
        working-directory: infra/terraform
