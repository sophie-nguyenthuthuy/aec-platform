apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: aec-platform
spec:
  replicas: 2
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
    spec:
      containers:
        - name: api
          image: ghcr.io/aec-platform/api:latest
          ports: [{ containerPort: 8000 }]
          envFrom:
            - secretRef: { name: api-secrets }
            - configMapRef: { name: api-config }
          env:
            - name: SITEEYE_RAY_SERVE_URL
              value: "http://siteeye-safety.aec-platform.svc.cluster.local:8000"
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 30
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "2Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: aec-platform
spec:
  selector: { app: api }
  ports:
    - port: 80
      targetPort: 8000
